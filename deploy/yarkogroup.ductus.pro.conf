server {
    listen 80;
    listen [::]:80;
    server_name yarkogroup.ductus.pro;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yarkogroup.ductus.pro;

    ssl_certificate     /etc/letsencrypt/live/yarkogroup.ductus.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yarkogroup.ductus.pro/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /var/www/yarkogroup;
    index index.html;

    # === КЭШИРОВАНИЕ ОТКЛЮЧЕНО МАКСИМАЛЬНО (период активных правок) ===
    # каждое обновление сайта открывается сразу, без устаревших версий.
    # Позже, когда правки утихнут, вернуть immutable-кэш для /assets (имена хэшированы).
    etag off;
    if_modified_since off;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    # PocketBase (CMS): /pb/api/ — публичное чтение контента фронтом; /pb/_/ — админ-панель.
    location /pb/ {
        proxy_pass http://127.0.0.1:8090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # SPA: deep-links (React Router) отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
